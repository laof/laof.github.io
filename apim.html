
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ip-tools</title>
    <style>
        * {
            padding: 0;
            margin: 0;
        }

        textarea {
            width: calc(100% - 12px);
            height: 300px;
            padding: 6px;
        }

        .code {
            width: calc(100% - 40px);
            overflow-x: scroll;
            padding: 20px;
            background: #434040;
            color: wheat;
        }

        button {
            padding: 6px 16px;
            font-size: 16px;
            margin: 6px 12px 6px 0;
        }

        button:last-child {
            margin-right: 0;
        }

        .buts {
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>

<body style="padding: 6px;">
    <div class="text">
        <textarea></textarea>
    </div>
    <div class="buts">
        <div>
            <button onclick="set()">set</button>
            <button onclick="get()">copy</button>
        </div>
    </div>
    <pre class="list" style="background: #3a3a3a; color: #fff; padding: 4px;"></pre>
    <div style="margin-top: 12px;">
        <pre class="code"></pre>
    </div>
    <script>
        window.copy = '';
        function set() {
            copy = '';
            document.querySelector('.code').innerHTML = '';
            const txt = document.querySelector('textarea')
            const ip = txt.value.match(/\b\d{1,3}(?:\.\d{1,3}){3}\b/g);
            const iplist = [...new Set(ip)];
            document.querySelector('.list').innerHTML = iplist.join('\n')

            if (iplist.length) {
                const ip = iplist.join('|').replaceAll('.', '\\.')
                const code = `string a${getFormattedDateTime()} = @"(${ip})";`
                document.querySelector('.code').innerHTML = code;
                copy = code
            }
        }
        function get(go) {
            // if (copy === '') {
            //     return alert('no data')
            // }
            navigator.clipboard.writeText(copy).then(() => {
            }).catch(err => {
                document.querySelector('.code').innerHTML = 'Failed to copy text: ';
            });

        }


        function getFormattedDateTime() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            return `${year}${month}${day}_${hours}${minutes}`;
        }

        function addCopy(value) {
            navigator.clipboard.writeText(value).then(() => {
            }).catch(err => { console.info(err) });
        }
    </script>
</body>

</html>
